<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商標法 基本書アプリ</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f7;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .term {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .lang {
      color: #666;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .def {
      margin-bottom: 10px;
    }

    .note {
      font-size: 13px;
      color: #888;
    }

    .controls {
      margin-bottom: 12px;
    }

    button {
      padding: 6px 10px;
      margin-right: 6px;
      border-radius: 6px;
      border: none;
      background: #333;
      color: white;
    }

    input {
      padding: 6px;
      width: 100%;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

  <h1>商標法 基本書アプリ</h1>

  <div class="controls">
    <button onclick="shuffle()">シャッフル</button>
    <button onclick="toggleLang()">言語切替</button>
  </div>

  <input type="text" placeholder="検索..." oninput="search(this.value)" />

  <div id="cards"></div>

  <script>
    let cards = [];
    let currentLang = "ja";

    async function loadCards() {
      const res = await fetch("cards.json?v=" + Date.now());
      cards = await res.json();
      render(cards);
    }

    function render(list) {
      const container = document.getElementById("cards");
      container.innerHTML = "";

      list.forEach(c => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="term">${c.term[currentLang]}</div>
          <div class="lang">
            ${c.term.en} / ${c.term.de} / ${c.term.it}
          </div>
          <div class="def">${c.definition[currentLang]}</div>
          <div class="note">${c.note?.ja || ""}</div>
        `;

        container.appendChild(div);
      });
    }

    function shuffle() {
      cards.sort(() => Math.random() - 0.5);
      render(cards);
    }

    function toggleLang() {
      currentLang = currentLang === "ja" ? "en" : "ja";
      render(cards);
    }

    function search(keyword) {
      const filtered = cards.filter(c =>
        c.term.ja.includes(keyword) ||
        c.term.en.includes(keyword) ||
        c.term.de.includes(keyword)
      );
      render(filtered);
    }

    loadCards();
  </script>

</body>
</html>
